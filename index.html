<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FADE PARTY — Владикавказ | 20 Июля</title>
    <meta name="description" content="Fade Party - All Star Moscow DJ's в ресторане Торне, Владикавказ. 20 июля, 19:00. Билеты в WhatsApp.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-orange: #ff6600;
            --neon-gold: #ffd700;
            --neon-pink: #ff0080;
            --dark-bg: #0a0a0a;
            --gradient-bg: linear-gradient(135deg, #0a0a0a 0%, #1a0d00 25%, #2d1b00 50%, #1a0d00 75%, #0a0a0a 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: var(--gradient-bg);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 100% 0%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--neon-orange);
            border-radius: 50%;
            animation: float 15s infinite linear;
            box-shadow: 0 0 6px var(--neon-orange);
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0px);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }

        /* Header Section */
        .header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 20px;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            color: var(--neon-orange);
            text-shadow: 
                0 0 10px var(--neon-orange),
                0 0 20px var(--neon-orange),
                0 0 40px var(--neon-orange),
                0 0 80px var(--neon-orange);
            animation: neonPulse 3s ease-in-out infinite;
            margin-bottom: 30px;
            letter-spacing: 8px;
        }

        @keyframes neonPulse {
            0%, 100% {
                text-shadow: 
                    0 0 10px var(--neon-orange),
                    0 0 20px var(--neon-orange),
                    0 0 40px var(--neon-orange);
            }
            50% {
                text-shadow: 
                    0 0 20px var(--neon-orange),
                    0 0 40px var(--neon-orange),
                    0 0 80px var(--neon-orange),
                    0 0 120px var(--neon-orange);
            }
        }

        .event-info {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        .event-info .date {
            color: var(--neon-gold);
            font-size: 32px;
            display: block;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--neon-gold);
        }

        .event-info .location {
            color: #ccc;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .event-info .subtitle {
            color: var(--neon-pink);
            font-size: 20px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .main-cta {
            display: inline-block;
            background: linear-gradient(45deg, var(--neon-orange), var(--neon-gold));
            color: black;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 
                0 0 20px var(--neon-orange),
                0 10px 30px rgba(255, 102, 0, 0.3);
            animation: buttonPulse 2s ease-in-out infinite, fadeInUp 1s ease 1s both;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .main-cta::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .main-cta:hover::before {
            left: 100%;
        }

        .main-cta:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 0 30px var(--neon-orange),
                0 15px 40px rgba(255, 102, 0, 0.4);
        }

        @keyframes buttonPulse {
            0%, 100% { box-shadow: 0 0 20px var(--neon-orange), 0 10px 30px rgba(255, 102, 0, 0.3); }
            50% { box-shadow: 0 0 40px var(--neon-orange), 0 15px 40px rgba(255, 102, 0, 0.5); }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Lineup Section */
        .lineup-section {
            padding: 100px 20px;
            text-align: center;
            position: relative;
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 700;
            color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-gold);
            margin-bottom: 60px;
            animation: fadeInUp 1s ease both;
        }

        .lineup-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }

        .dj-card {
            background: rgba(255, 102, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-orange);
            border-radius: 20px;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease both;
        }

        .dj-card:nth-child(2) { animation-delay: 0.2s; }
        .dj-card:nth-child(3) { animation-delay: 0.4s; }

        .dj-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 102, 0, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .dj-card:hover::before {
            left: 100%;
        }

        .dj-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-gold);
            box-shadow: 
                0 0 30px var(--neon-orange),
                0 20px 40px rgba(255, 102, 0, 0.3);
        }

        .dj-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, var(--neon-orange), var(--neon-gold));
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 0 20px var(--neon-orange);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dj-name {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--neon-gold);
            text-shadow: 0 0 10px var(--neon-gold);
            margin-bottom: 10px;
        }

        .dj-role {
            font-size: 16px;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .support-text {
            font-size: 24px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            margin-top: 40px;
            animation: fadeInUp 1s ease 0.6s both;
        }

        /* Tickets Section */
        .tickets-section {
            padding: 100px 20px;
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .tickets-info {
            max-width: 600px;
            margin: 0 auto 50px;
        }

        .age-restriction {
            font-size: 28px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            margin-bottom: 20px;
            animation: fadeInUp 1s ease both;
        }

        .ticket-info {
            font-size: 20px;
            color: #ccc;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: #25D366;
            color: white;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 
                0 0 20px #25D366,
                0 10px 30px rgba(37, 211, 102, 0.3);
            animation: whatsappPulse 2s ease-in-out infinite, fadeInUp 1s ease 0.4s both;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .whatsapp-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .whatsapp-btn:hover::before {
            left: 100%;
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 0 30px #25D366,
                0 15px 40px rgba(37, 211, 102, 0.4);
        }

        @keyframes whatsappPulse {
            0%, 100% { box-shadow: 0 0 20px #25D366, 0 10px 30px rgba(37, 211, 102, 0.3); }
            50% { box-shadow: 0 0 40px #25D366, 0 15px 40px rgba(37, 211, 102, 0.5); }
        }

        /* Footer */
        .footer {
            padding: 60px 20px 40px;
            text-align: center;
            border-top: 1px solid rgba(255, 102, 0, 0.3);
        }

        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .organizers {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .organizer {
            font-size: 18px;
            color: var(--neon-gold);
            text-shadow: 0 0 10px var(--neon-gold);
            animation: fadeInUp 1s ease both;
        }

        .contact-btn {
            display: inline-block;
            background: rgba(255, 102, 0, 0.2);
            border: 2px solid var(--neon-orange);
            color: var(--neon-orange);
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .contact-btn:hover {
            background: var(--neon-orange);
            color: black;
            box-shadow: 0 0 20px var(--neon-orange);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 4rem;
                letter-spacing: 4px;
            }
            
            .event-info .date {
                font-size: 24px;
            }
            
            .event-info .location {
                font-size: 16px;
            }
            
            .section-title {
                font-size: 36px;
            }
            
            .lineup-container {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .dj-card {
                padding: 30px 15px;
            }
            
            .dj-name {
                font-size: 24px;
            }
            
            .organizers {
                flex-direction: column;
                gap: 20px;
            }
        }

        /* Scroll Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation"></div>
    
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Header Section -->
    <section class="header">
        <h1 class="logo">FADE</h1>
        <div class="event-info">
            <span class="date">20 ИЮЛЯ / 19:00</span>
            <div class="location">Ресторан "Торне", г. Владикавказ</div>
            <div class="location">ул. Гизельское шоссе, 26</div>
            <div class="subtitle">All Star Moscow DJ's</div>
        </div>
        <a href="https://wa.me/79268219999?text=Привет!%20Хочу%20купить%20билет%20на%20FADE%20PARTY%2020%20июля" 
           class="main-cta" target="_blank">
            🎟️ КУПИТЬ БИЛЕТ
        </a>
    </section>

    <!-- Lineup Section -->
    <section class="lineup-section">
        <h2 class="section-title fade-in">LINE-UP</h2>
        <div class="lineup-container">
            <div class="dj-card fade-in">
                <div class="dj-avatar">🎧</div>
                <div class="dj-name">D.A.L.I.</div>
                <div class="dj-role">Moscow DJ</div>
            </div>
            <div class="dj-card fade-in">
                <div class="dj-avatar">🎵</div>
                <div class="dj-name">MEG</div>
                <div class="dj-role">Moscow DJ</div>
            </div>
            <div class="dj-card fade-in">
                <div class="dj-avatar">🔥</div>
                <div class="dj-name">NERAK</div>
                <div class="dj-role">Moscow DJ</div>
            </div>
        </div>
        <div class="support-text fade-in">Support: KHURY</div>
    </section>

    <!-- Tickets Section -->
    <section class="tickets-section">
        <div class="tickets-info">
            <div class="age-restriction fade-in">21+</div>
            <div class="ticket-info fade-in">Билеты только через WhatsApp</div>
            <a href="https://wa.me/79268219999?text=Привет!%20Хочу%20купить%20билет%20на%20FADE%20PARTY%2020%20июля" 
               class="whatsapp-btn fade-in" target="_blank">
                <span>📱</span>
                БИЛЕТ В WHATSAPP
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="organizers">
                <div class="organizer fade-in">resident.yaa</div>
                <div class="organizer fade-in">mescal group</div>
            </div>
            <a href="https://wa.me/79268219999?text=Привет!%20У%20меня%20есть%20вопрос%20по%20FADE%20PARTY" 
               class="contact-btn fade-in" target="_blank">
                Отправить сообщение
            </a>
        </div>
    </footer>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                
                // Random colors
                const colors = ['#ff6600', '#ffd700', '#ff0080'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = color;
                particle.style.boxShadow = `0 0 6px ${color}`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        // Observe all fade-in elements
        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
        });

        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Add click ripple effect
        document.addEventListener('click', (e) => {
            if (e.target.closest('a, button')) {
                const ripple = document.createElement('div');
                ripple.style.cssText = `
                    position: fixed;
                    width: 100px;
                    height: 100px;
                    background: radial-gradient(circle, rgba(255, 102, 0, 0.6), transparent);
                    border-radius: 50%;
                    pointer-events: none;
                    z-index: 9999;
                    animation: ripple 0.6s ease-out;
                    left: ${e.clientX - 50}px;
                    top: ${e.clientY - 50}px;
                `;
                
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                0% {
                    transform: scale(0);
                    opacity: 1;
                }
                100% {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        createParticles();

        // Add mouse move parallax effect
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            
            document.querySelectorAll('.dj-avatar').forEach((avatar, index) => {
                const speed = (index + 1) * 0.5;
                const x = (mouseX - 0.5) * speed;
                const y = (mouseY - 0.5) * speed;
                avatar.style.transform = `translate(${x}px, ${y}px) rotate(${Date.now() * 0.001 + index}rad)`;
            });
        });
    </script>
</body>
</html>
